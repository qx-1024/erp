# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 数据库配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/erp_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.qiu.system.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token配置
sa-token:
  # token名称（同时也是cookie名称）
  token-name: satoken
  # token有效期（单位：秒）
  timeout: 2592000
  # token临时有效期（单位：秒）
  active-timeout: -1
  # 是否允许同一账号多处登录
  is-concurrent: true
  # 同一账号最大登录数量
  max-login-count: 10
  # 是否在初始化时自动注册拦截器
  is-auto-package: true
  # 是否打开自动续签
  is-renew: true
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: false


